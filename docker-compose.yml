services:

  user_service_1:
    build: ./user_service
    container_name: user_service_1
    restart: unless-stopped
    environment:
      - PORT=3001
      - SQLITE_PATH=/data/bank.db
    volumes:
      - sqlite_data:/data
      - ./shared:/app/shared
    depends_on:
      - sqlite
    networks:
      - bank_net

  user_service_2:
    build: ./user_service
    container_name: user_service_2
    restart: unless-stopped
    environment:
      - PORT=3001
      - SQLITE_PATH=/data/bank.db
    volumes:
      - sqlite_data:/data
      - ./shared:/app/shared
    depends_on:
      - sqlite
    networks:
      - bank_net
  
  user_service_3:
    build: ./user_service
    container_name: user_service_3
    restart: unless-stopped
    environment:
      - PORT=3001
      - SQLITE_PATH=/data/bank.db
    volumes:
      - sqlite_data:/data
      - ./shared:/app/shared
    depends_on:
      - sqlite
    networks:
      - bank_net

  account_service1:
    build: ./account_service
    container_name: account_service1
    restart: unless-stopped
    expose:
      - "3003"
    environment:
      - PORT=3003
      - SQLITE_PATH=/data/bank.db
    volumes:
      - sqlite_data:/data
      - ./shared:/app/shared
    depends_on:
      - sqlite
    networks:
      - bank_net

  account_service2:
    build: ./account_service
    container_name: account_service2
    restart: unless-stopped
    expose:
      - "3003"
    environment:
      - PORT=3003
      - SQLITE_PATH=/data/bank.db
    volumes:
      - sqlite_data:/data
      - ./shared:/app/shared
    depends_on:
      - sqlite
    networks:
      - bank_net

  account_service3:
    build: ./account_service
    container_name: account_service3
    restart: unless-stopped
    expose:
      - "3003"
    environment:
      - PORT=3003
      - SQLITE_PATH=/data/bank.db
    volumes:
      - sqlite_data:/data
      - ./shared:/app/shared
    depends_on:
      - sqlite
    networks:
      - bank_net

  notification_service1:
    build: ./notification_service
    container_name: notification_service1
    restart: unless-stopped
    expose:
      - "3002"
    environment:
      - PORT=3002
      - SQLITE_PATH=/data/bank.db
    volumes:
      - sqlite_data:/data
      - ./shared:/app/shared
    depends_on:
      - sqlite
    networks:
      - bank_net

  notification_service2:
    build: ./notification_service
    container_name: notification_service2
    restart: unless-stopped
    expose:
      - "3002"
    environment:
      - PORT=3002
      - SQLITE_PATH=/data/bank.db
    volumes:
      - sqlite_data:/data
      - ./shared:/app/shared
    depends_on:
      - sqlite
    networks:
      - bank_net

  notification_service3:
    build: ./notification_service
    container_name: notification_service3
    restart: unless-stopped
    expose:
      - "3002"
    environment:
      - PORT=3002
      - SQLITE_PATH=/data/bank.db
    volumes:
      - sqlite_data:/data
      - ./shared:/app/shared
    depends_on:
      - sqlite
    networks:
      - bank_net

  transfert_service1:
    build: ./transfert_service
    container_name: transfert_service1
    restart: unless-stopped
    expose:
      - "3004"
    environment:
      - PORT=3004
      - SQLITE_PATH=/data/bank.db
    volumes:
      - sqlite_data:/data
      - ./shared:/app/shared
    depends_on:
      - sqlite
    networks:
      - bank_net

  transfert_service2:
    build: ./transfert_service
    container_name: transfert_service2
    restart: unless-stopped
    expose:
      - "3004"
    environment:
      - PORT=3004
      - SQLITE_PATH=/data/bank.db
    volumes:
      - sqlite_data:/data
      - ./shared:/app/shared
    depends_on:
      - sqlite
    networks:
      - bank_net

  transfert_service3:
    build: ./transfert_service
    container_name: transfert_service3
    restart: unless-stopped
    expose:
      - "3004"
    environment:
      - PORT=3004
      - SQLITE_PATH=/data/bank.db
    volumes:
      - sqlite_data:/data
      - ./shared:/app/shared
    depends_on:
      - sqlite
    networks:
      - bank_net


  frontend_bff:
    build: ./frontend
    container_name: frontend_bff
    restart: unless-stopped
    environment:
      - PORT=8080
      - LB_BASE_URL=http://nginx
    ports:
      - "8080:8080"
    depends_on:
      - nginx
    networks:
      - bank_net

  nginx:
    image: nginx:alpine
    container_name: nginx_lb
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - bank_net
  # ───────────────────────────────
  # Base SQLite (volume partagé)
  # ───────────────────────────────
  sqlite:
    image: alpine
    container_name: sqlite_volume
    command: ["tail", "-f", "/dev/null"]  
    ports:
      - "3306:3306"  
    volumes:
      - sqlite_data:/data
    networks:
      - bank_net

# ───────────────────────────────
# Réseau partagé
# ───────────────────────────────
networks:
  bank_net:
    driver: bridge
  bank_net_front:
    driver: bridge

# ───────────────────────────────
# Volume SQLite partagé
# ───────────────────────────────
volumes:
  sqlite_data:
    driver: local